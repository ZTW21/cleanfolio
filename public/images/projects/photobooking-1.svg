<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <rect width="800" height="500" fill="#0A0A0A"/>
  <!-- Browser outline -->
  <rect x="1" y="1" width="798" height="498" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Browser chrome bar -->
  <rect x="1" y="1" width="798" height="36" fill="#0A0A0A" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Traffic light dots -->
  <circle cx="20" cy="19" r="5" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <circle cx="38" cy="19" r="5" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <circle cx="56" cy="19" r="5" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <!-- URL bar hint -->
  <rect x="80" y="10" width="300" height="18" fill="none" stroke="#2A2A2A" stroke-width="1"/>
  <!-- Accent dot -->
  <circle cx="400" cy="230" r="3" fill="#CDFF00"/>
  <!-- Project name -->
  <text x="400" y="270" fill="#666666" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4">PHOTO BOOKING</text>
  <!-- Screenshot label -->
  <text x="400" y="300" fill="#666666" font-family="monospace" font-size="12" text-anchor="middle" letter-spacing="2">Screenshot 1</text>
</svg>
